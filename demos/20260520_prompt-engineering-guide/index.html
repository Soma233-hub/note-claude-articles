<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロンプトエンジニアリング テクニック比較デモ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .header p { color: #94a3b8; font-size: 0.9rem; }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 1140px;
    margin-bottom: 28px;
  }

  .panel {
    background: #1e293b;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #334155;
  }
  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  .badge-before { background: #dc2626; color: #fff; }
  .badge-after  { background: #16a34a; color: #fff; }
  .panel-title { font-size: 1rem; font-weight: 600; color: #cbd5e1; }

  .technique-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }
  .tech-btn {
    background: #1e293b;
    border: 1px solid #475569;
    color: #94a3b8;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.82rem;
    transition: all 0.2s;
  }
  .tech-btn:hover { border-color: #60a5fa; color: #60a5fa; }
  .tech-btn.active {
    background: #1d4ed8;
    border-color: #3b82f6;
    color: #fff;
  }

  .prompt-box {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    white-space: pre-wrap;
    color: #e2e8f0;
    min-height: 120px;
    margin-bottom: 12px;
  }
  .output-box {
    background: #0f172a;
    border: 1px solid #1e40af;
    border-left: 3px solid #3b82f6;
    border-radius: 8px;
    padding: 14px;
    font-size: 0.83rem;
    line-height: 1.7;
    color: #bfdbfe;
    min-height: 80px;
    white-space: pre-wrap;
  }
  .output-label {
    font-size: 0.72rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .score-bar-container {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .score-label { font-size: 0.78rem; color: #94a3b8; min-width: 60px; }
  .score-track {
    flex: 1;
    background: #334155;
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .score-fill.before { background: #ef4444; }
  .score-fill.after  { background: #22c55e; }
  .score-num { font-size: 0.82rem; font-weight: 700; min-width: 40px; text-align: right; }

  .tip-box {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 18px 24px;
    width: 100%;
    max-width: 1140px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .tip-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
  .tip-content h3 { font-size: 0.95rem; font-weight: 700; color: #60a5fa; margin-bottom: 6px; }
  .tip-content p { font-size: 0.85rem; color: #94a3b8; line-height: 1.6; }

  .divider { color: #475569; font-size: 0.8rem; margin: 8px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>プロンプトエンジニアリング テクニック比較デモ</h1>
  <p>テクニックを選択して、Before / After の出力品質の差を体感してください</p>
</div>

<div class="technique-selector" id="techSelector"></div>

<div class="container">
  <div class="panel" id="beforePanel">
    <div class="panel-header">
      <span class="badge badge-before">BEFORE</span>
      <span class="panel-title">改善前のプロンプト</span>
    </div>
    <div class="prompt-box" id="beforePrompt"></div>
    <div class="output-label">AI の出力イメージ</div>
    <div class="output-box" id="beforeOutput"></div>
    <div class="score-bar-container">
      <span class="score-label">出力品質</span>
      <div class="score-track"><div class="score-fill before" id="beforeBar"></div></div>
      <span class="score-num" id="beforeScore"></span>
    </div>
  </div>

  <div class="panel" id="afterPanel">
    <div class="panel-header">
      <span class="badge badge-after">AFTER</span>
      <span class="panel-title">テクニック適用後</span>
    </div>
    <div class="prompt-box" id="afterPrompt"></div>
    <div class="output-label">AI の出力イメージ</div>
    <div class="output-box" id="afterOutput"></div>
    <div class="score-bar-container">
      <span class="score-label">出力品質</span>
      <div class="score-track"><div class="score-fill after" id="afterBar"></div></div>
      <span class="score-num" id="afterScore"></span>
    </div>
  </div>
</div>

<div class="tip-box" id="tipBox">
  <div class="tip-icon">💡</div>
  <div class="tip-content">
    <h3 id="tipTitle"></h3>
    <p id="tipDesc"></p>
  </div>
</div>

<script>
const techniques = [
  {
    id: "cot",
    label: "①Chain-of-Thought",
    before: `このメールは良いですか？\n\n「お世話になっております。先日の件ですが、\nご確認いただけましたでしょうか。」`,

    beforeOut: "普通のメールだと思います。丁寧な表現が使われています。",

    beforeScore: 25,

  },

    beforeScore: 20,

    tip: "出力フォーマット指定",

  },
  {

    before: `新商品のキャッチコピーを作ってください。\n商品: 睡眠改善サプリメント`,
    after: `新商品のキャッチコピーを5案作成してください。\n\n制約条件:\n- 文字数: 15〜20文字\n- トーン: 科学的・信頼感\n- 禁止ワード: 「革命」「奇跡」「絶対」\n- ターゲット: 30〜50代のビジネスパーソン\n- 差別化点: 天然由来成分100%\n\n商品: 睡眠改善サプリメント`,
    beforeOut: "①眠れない夜よ、さようなら！\n②革命的な睡眠体験\n③絶対に効く！魔法の眠り\n④ぐっすり眠れる奇跡のサプリ",

    beforeScore: 18,
    afterScore: 87,
    tip: "SCQA構造",
    tipDesc: "コンサルファームで使われるフレームワーク。「なぜこの提案が必要か」のストーリーラインが自動で構成される。説得力の高いビジネス文書に最適。"
  },
  {
    id: "fewshot",
    label: "⑥Few-shot例示",

    after: `商品レビューの感情を以下のルールで分類してください。\n\n例1: 「壊れやすくてすぐ返品しました」→ ネガティブ(品質:1, 配送:3)\n例2: 「梱包が丁寧で品物も最高です！」→ ポジティブ(品質:5, 配送:5)\n例3: 「値段の割には普通かな」→ ニュートラル(品質:3, 配送:3)\n\n判定対象:\n「到着が遅れましたが、品質は期待以上でした」`,

    beforeScore: 30,
    afterScore: 93,
    tip: "Few-shot学習（例示）",
    tipDesc: "入出力ペアの例を2〜3個見せることで、AIが「こういう形式・基準で答えるべき」と学習する。ゼロショットと比べて精度・一貫性が格段に上がる。"
  },
  {
    id: "selfcritique",
    label: "⑦自己批評",

    beforeOut: "テレワークでは自己管理が重要です。タスク管理ツールを活用し、集中できる環境を整えましょう。定期的なオンラインMTGで...",

    after: `以下の会議録から情報を抽出します。\n\n抽出ルール:\n- 決定事項: 「〜することになった」「〜に決定」を含む文のみ\n- 担当者と期限を必ずセットで抽出\n- 未決事項は「要確認」タグをつける\n\n出力形式:\n✅ 決定: [内容] 担当:[名前] 期限:[日付]\n⚠️ 要確認: [内容]\n\n会議録:\n「来週中に田中が仕様書を作成する。デザインは山田に依頼予定だが\nまだ確認中。予算は500万円で承認された。リリース日は未定。」`,
    beforeOut: "この会議では仕様書の作成やデザイン、予算について話し合われました。いくつかの事項が決定されたようです。",

    beforeScore: 20,
    afterScore: 96,
    tip: "コンテキスト圧縮・構造化抽出",
    tipDesc: "長文を渡す前に「何をどう抽出するか」のルールを先に定義する。出力形式まで指定することで、そのままドキュメントに貼り付け可能な成果物が得られる。"
  }
];

let currentIdx = 0;

function render(idx) {
  const t = techniques[idx];
  document.getElementById('beforePrompt').textContent = t.before;
  document.getElementById('afterPrompt').textContent = t.after;
  document.getElementById('beforeOutput').textContent = t.beforeOut;
  document.getElementById('afterOutput').textContent = t.afterOut;
  document.getElementById('beforeBar').style.width = t.beforeScore + '%';
  document.getElementById('afterBar').style.width  = t.afterScore  + '%';
  document.getElementById('beforeScore').textContent = t.beforeScore + '/100';
  document.getElementById('afterScore').textContent  = t.afterScore  + '/100';
  document.getElementById('tipTitle').textContent = '💡 テクニック: ' + t.tip;
  document.getElementById('tipDesc').textContent  = t.tipDesc;

  document.querySelectorAll('.tech-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
}

const selector = document.getElementById('techSelector');
techniques.forEach((t, i) => {
  const btn = document.createElement('button');
  btn.className = 'tech-btn' + (i === 0 ? ' active' : '');
  btn.textContent = t.label;
  btn.onclick = () => { currentIdx = i; render(i); };
  selector.appendChild(btn);
});

render(0);
</script>
</body>
</html>
